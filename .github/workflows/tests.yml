name: PDP CI Tests

on:
  pull_request:
  push:
    branches: [ master, main, v* ]
  workflow_call:
    secrets:
      PDP_TESTER_API_KEY:
        required: true
      CLONE_REPO_TOKEN:
        required: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - uses: pre-commit/action@v3.0.1
  pytests:
    runs-on: ubuntu-latest
    steps:
      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.8'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Pytests
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pytest -s --cache-clear horizon/tests/

  build-pdp-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: permitio/permit-opa
          ref: main
          path: './permit-opa'
          token: ${{ secrets.CLONE_REPO_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pre build PDP tests
        run: |
          echo "next" > permit_pdp_version
          rm -rf custom
          mkdir custom
          build_root="$PWD"
          cd ./permit-opa
          find * \( -name '*go*' -o -name 'LICENSE.md' \) -print0 | xargs -0 tar -czf "$build_root"/custom/custom_opa.tar.gz --exclude '.*'

      - name: Build and load PDP Docker image
        uses: docker/build-push-action@v5
        with:
          push: false
          load: true
          context: .
          platforms: linux/amd64
          tags: permitio/pdp-v2:next
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image as artifact
        run: docker save permitio/pdp-v2:next -o pdp-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdp-image
          path: pdp-image.tar
          retention-days: 1

  pdp-tester:
    runs-on: ubuntu-latest
    needs: build-pdp-image
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: pdp-image

      - name: Load Docker image
        run: docker load -i pdp-image.tar

      # Checkout the pdp-tester repository
      - name: Checkout pdp-tester repository
        uses: actions/checkout@v4
        with:
          repository: "permitio/pdp-tester"
          token: ${{ secrets.CLONE_REPO_TOKEN }}
          path: './pdp-tester'

      # Start k3d cluster for Kubernetes-based pdp-tester
      - name: Start k3d cluster
        uses: AbsaOSS/k3d-action@v2.4.0
        with:
          cluster-name: pdp-tester
          args: --k3s-arg "--disable=traefik@server:0"

      # Tag and import PDP image into k3d
      # Tag as 'latest' so pdp-tester's default includeTags picks it up
      - name: Import PDP image into k3d
        run: |
          docker tag permitio/pdp-v2:next permitio/pdp-v2:latest
          k3d image import permitio/pdp-v2:latest -c pdp-tester

      # Build pdp-tester image and import into k3d
      - name: Build and import pdp-tester image
        working-directory: ./pdp-tester
        run: |
          docker build -t pdp-tester:ci .
          k3d image import pdp-tester:ci -c pdp-tester

      # Create namespace and secrets
      - name: Create secrets
        env:
          PERMIT_TOKEN: ${{ secrets.PDP_TESTER_API_KEY }}
        run: |
          kubectl create namespace pdp-tester || true
          kubectl create secret generic pdp-tester-credentials \
            -n pdp-tester \
            --from-literal=token="${PERMIT_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # Deploy pdp-tester via Helm with the "next" PDP image
      - name: Deploy pdp-tester via Helm
        working-directory: ./pdp-tester
        run: |
          helm install pdp-tester ./deploy/helm/pdp-tester \
            --set mode=job \
            --set permit.existingSecret=pdp-tester-credentials \
            --set permit.apiUrl=https://permitio.api.stg.permit.io \
            --set image.repository=pdp-tester \
            --set image.tag=ci \
            --set image.pullPolicy=Never \
            --set pdp.image=permitio/pdp-v2 \
            --set tests.skipGenerate=true \
            --set namespace.create=false \
            --set logJson=false

      - name: Wait for Job completion
        run: |
          kubectl wait --for=condition=complete job/pdp-tester \
            -n pdp-tester --timeout=600s

      - name: Check test results
        run: |
          LOGS=$(kubectl logs job/pdp-tester -n pdp-tester)
          echo "$LOGS" | tail -30
          if echo "$LOGS" | grep -q "test cases failed"; then
            echo "::error::Some test cases failed!"
            exit 1
          fi

      - name: Print tester logs
        if: always()
        run: |
          echo "=== PDP Tester logs ==="
          kubectl logs job/pdp-tester -n pdp-tester --tail=200 || true
          echo ""
          echo "=== PDP Pod logs ==="
          kubectl logs -l pdp-tester.permit.io/managed-by=pdp-tester \
            -n pdp-tester --tail=50 || true

      - name: Teardown k3d cluster
        if: always()
        run: k3d cluster delete pdp-tester || true

  docker-scout:
    runs-on: ubuntu-latest
    needs: build-pdp-image
    if: github.event_name == 'pull_request'
    permissions:
      # required to upload the SARIF report
      security-events: write
      # required to download the Docker image artifact
      contents: read
      # required to create a pull request comment with the SARIF report
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: pdp-image

      - name: Load Docker image
        run: docker load -i pdp-image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Scout CVE report (all severities)
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://permitio/pdp-v2:next
          exit-code: false
          sarif-file: scout-results.sarif
          summary: true

      - name: Docker Scout CVE gate (high and critical)
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://permitio/pdp-v2:next
          only-severities: critical,high
          exit-code: true

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scout-results.sarif

  rust-ci:
    name: Rust CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          shared-key: "rust-cache"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run cargo check
        run: cargo check --all --verbose

      - name: Run clippy
        run: cargo clippy --all -- -D warnings

      - name: Run tests
        run: cargo test --all --verbose
